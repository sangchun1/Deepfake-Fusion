program: scripts/run_sweep.py
method: bayes

metric:
  name: final_val_auc
  goal: maximize

parameters:
  lr:
    distribution: log_uniform_values
    min: 0.00003
    max: 0.0003

  weight_decay:
    distribution: log_uniform_values
    min: 0.00001
    max: 0.01

  batch_size:
    values: [16, 32, 64]

  dropout:
    values: [0.0, 0.1, 0.2, 0.3]

  epochs:
    values: [8, 10, 12]

  seed:
    values: [42]

  rotation_degrees:
    values: [0.0, 5.0, 10.0]

  color_jitter_prob:
    values: [0.0, 0.2, 0.4]

command:
  - ${env}
  - python
  - ${program}
  - --data_config
  - configs/data/genimage.yaml
  - --model_config
  - configs/model/resnet18.yaml
  - --train_config
  - configs/train/spatial_genimage.yaml