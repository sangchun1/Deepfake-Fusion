metric:
  name: final_val_auc
  goal: maximize

command:
  - ${env}
  - python
  - ${program}
  - --data_config
  - configs/data/cifake.yaml
  - --model_config
  - configs/model/spai.yaml
  - --train_config
  - configs/train/frequency_spai_cifake.yaml

parameters:
  lr:
    distribution: log_uniform_values
    min: 0.00003
    max: 0.0003

  weight_decay:
    distribution: log_uniform_values
    min: 0.00001
    max: 0.01

  batch_size:
    values: [16, 32]

  dropout:
    values: [0.0, 0.1, 0.2]

  epochs:
    values: [12, 15]

  seed:
    values: [42]

  rotation_degrees:
    values: [0.0, 5.0, 10.0]

  color_jitter_prob:
    values: [0.0, 0.2, 0.4]

  drop_path_rate:
    values: [0.0, 0.05, 0.1]

  freeze_backbone:
    values: [false, true]

  img_size:
    values: [224]

  warmup_epochs:
    values: [0, 1, 3]

  min_lr:
    values: [1.0e-6, 5.0e-6]

  radius_ratio:
    values: [0.15, 0.25, 0.35]

  high_from_residual:
    values: [true, false]

  num_selected_blocks:
    values: [2, 4, 6]

  token_pool:
    values: ["attention", "avg", "cls"]

  feature_pool:
    values: ["cls", "avg"]