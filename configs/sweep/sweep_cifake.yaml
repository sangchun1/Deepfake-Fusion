program: scripts/run_sweep.py

method: bayes

metric:
  name: val_auc
  goal: maximize

command:
  - ${env}
  - ${interpreter}
  - ${program}
  - --data_config
  - configs/data/cifake.yaml
  - --model_config
  - configs/model/resnet18.yaml
  - --train_config
  - configs/train/spatial_cifake.yaml

parameters:
  lr:
    values: [0.0001, 0.0003, 0.001]

  weight_decay:
    values: [0.00001, 0.0001, 0.001]

  batch_size:
    values: [16, 32, 64]

  dropout:
    values: [0.0, 0.2, 0.5]

  rotation_degrees:
    values: [0.0, 10.0, 20.0]

  color_jitter_prob:
    values: [0.0, 0.2, 0.5]

  epochs:
    value: 8

  seed:
    value: 42