name: face130k

dataset_class: FACE130KDataset

num_classes: 2

task: binary_classification

paths:
  root_dir: data/raw/face130k

  # merged
  train_csv: data/splits/face130k/merged/train.csv
  val_csv: data/splits/face130k/merged/val.csv
  test_csv: data/splits/face130k/merged/test.csv

  # # by_generator(flux_dev, flux_pro, sdxl)
  # train_csv: data/splits/face130k/by_generator/flux_dev/train.csv
  # val_csv: data/splits/face130k/by_generator/flux_dev/val.csv
  # test_csv: data/splits/face130k/by_generator/flux_dev/test.csv

  # # logo(holdout_flux_dev, holdout_flux_pro, holdout_sdxl)
  # train_csv: data/splits/face130k/logo/holdout_flux_dev/train.csv
  # val_csv: data/splits/face130k/logo/holdout_flux_dev/val.csv
  # test_csv: data/splits/face130k/logo/holdout_flux_dev/test.csv

image:
  input_size: 224
  channels: 3
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]

labels:
  real: 0
  fake: 1

dataloader:
  batch_size: 64
  num_workers: 4
  pin_memory: true
  drop_last: false

train:
  shuffle: true

val:
  shuffle: false

test:
  shuffle: false