name: genimage
dataset_class: GenImageDataset
num_classes: 2
task: binary_classification

paths:
  root_dir: data/raw/genimage
  train_csv: data/splits/genimage/merged/train.csv
  val_csv: data/splits/genimage/merged/val.csv
  test_csv: data/splits/genimage/merged/test.csv

image:
  input_size: 224
  channels: 3
  mean: [0.485, 0.456, 0.406]
  std: [0.229, 0.224, 0.225]

labels:
  real: 0
  fake: 1

dataloader:
  batch_size: 64
  num_workers: 4
  pin_memory: true
  drop_last: false

train:
  shuffle: true

val:
  shuffle: false

test:
  shuffle: false