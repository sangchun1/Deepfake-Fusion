project_root: C:\Deepfake-Fusion
data:
  name: openfake_by_generator_grok-2-image-1212
  dataset_class: OpenFakeDataset
  num_classes: 2
  task: binary_classification
  paths:
    root_dir: data/raw/openfake
    train_csv: C:/Deepfake-Fusion/data/splits/openfake/by_generator/grok-2-image-1212/train.csv
    val_csv: C:/Deepfake-Fusion/data/splits/openfake/by_generator/grok-2-image-1212/val.csv
    test_csv: C:/Deepfake-Fusion/data/splits/openfake/by_generator/grok-2-image-1212/test.csv
  image:
    input_size: 224
    channels: 3
    mean:
    - 0.485
    - 0.456
    - 0.406
    std:
    - 0.229
    - 0.224
    - 0.225
  labels:
    real: 0
    fake: 1
  dataloader:
    batch_size: 64
    num_workers: 4
    pin_memory: true
    drop_last: false
  train:
    shuffle: true
  val:
    shuffle: false
  test:
    shuffle: false
model:
  name: resnet18
  family: cnn
  source: torchvision
  backbone:
    name: resnet18
    pretrained: true
    in_channels: 3
    freeze: false
  head:
    num_classes: 2
    dropout: 0.5
  pooling: avg
  checkpoint:
    path: null
    strict: true
train:
  experiment:
    name: spatial_resnet18_openfake
    task: spatial_classification
    output_dir: C:/Deepfake-Fusion/outputs/spatial/resnet18_openfake/by_generator/grok-2-image-1212
    seed: 42
    device: cuda
    use_amp: true
  train:
    epochs: 10
    grad_accum_steps: 1
    clip_grad_norm: null
  optimizer:
    name: adamw
    lr: 0.0001
    weight_decay: 0.001
    betas:
    - 0.9
    - 0.999
  augmentation:
    rotation_degrees: 0.0
    color_jitter_prob: 0.0
  scheduler:
    name: cosine
    t_max: 10
    eta_min: 1.0e-06
  loss:
    name: cross_entropy
    label_smoothing: 0.0
  logging:
    log_interval: 50
    val_interval: 1
    use_tqdm: true
  checkpoint:
    save_top_k: 1
    monitor: val_auc
    mode: max
    resume_path: null
    early_stopping:
      enabled: true
      patience: 5
      min_delta: 0.0
  evaluation:
    metrics:
    - accuracy
    - precision
    - recall
    - f1
    - auc
    threshold: 0.5
  wandb:
    enabled: true
    project: Deepfake-Fusion
    entity: null
    name: spatial_resnet18_openfake
    tags:
    - openfake
    - resnet18
    - spatial
    mode: online
    log_model: false
